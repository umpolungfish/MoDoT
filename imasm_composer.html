<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IMASM Composer · pen-drawing style · live word input</title>
<style>
  :root { --bg:#050505; --panel:#0d0d0d; --edge:#222; --ink:#ddd; --dim:#666; --accent:#e3b341; --ok:#3fb950; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--ink); font:12.5px/1.45 "Everson Mono","DejaVu Sans Mono",monospace;
         display:grid; grid-template-columns:280px 1fr; grid-template-rows:1fr 170px; height:100vh; overflow:hidden; }
  #palette { grid-row:1/3; background:var(--panel); border-right:1px solid var(--edge); overflow-y:auto; padding:10px; }
  #palette h1 { font-size:13px; color:var(--accent); margin-bottom:6px; letter-spacing:.3px; }
  #palette input, #palette .word-row input { width:100%; background:#000; color:var(--ink); border:1px solid var(--edge);
    padding:4px 6px; margin-bottom:4px; font:inherit; border-radius:2px; }
  #palette .word-row { display:flex; gap:4px; align-items:center; margin-bottom:6px; }
  #palette .word-row input { flex:1; margin-bottom:0; }
  #palette .word-row span { color:var(--dim); font-size:10px; white-space:nowrap; }
  .pitem { padding:2px 6px; cursor:pointer; border-radius:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pitem:hover { background:#151515; }
  .pitem .meta { color:var(--dim); font-size:10px; }
  .sect { color:#555; margin:10px 0 3px; font-size:10px; letter-spacing:1px; text-transform:uppercase; }
  #canvasWrap { position:relative; overflow:hidden; background:#000; }
  #canvas { width:100%; height:100%; display:block; }
  #speak { grid-column:2; background:var(--panel); border-top:1px solid var(--edge); padding:6px 12px; overflow-y:auto; }
  #speak h2 { font-size:11px; color:var(--accent); margin-bottom:3px; }
  #cmds { white-space:pre-wrap; color:var(--ok); font-size:11px; }
  #speak .law { color:#444; font-size:10px; margin-top:4px; }
  button { background:#000; color:var(--ink); border:1px solid var(--edge); padding:1px 8px; font:inherit; cursor:pointer; margin-right:4px; border-radius:2px; font-size:11px; }
  button:hover { border-color:var(--accent); }
  #hint { position:absolute; bottom:8px; left:12px; color:#444; font-size:10px; pointer-events:none; z-index:2; }
  /* Node shapes */
  .pen-node { fill:none; stroke:var(--ink); stroke-width:1.2; }
  .pen-node.sel { stroke:var(--accent); stroke-width:1.8; }
  .pen-node text { fill:var(--ink); font:10px "Everson Mono",monospace; pointer-events:none; }
  .pen-port { fill:#000; stroke:#555; stroke-width:.8; cursor:pointer; }
  .pen-port.free:hover, .pen-port.armed { stroke:var(--accent); }
  .pen-port.used { fill:#1a2a1a; stroke:var(--ok); }
  .pen-wire { fill:none; stroke:var(--ink); opacity:.7; pointer-events:stroke; }
  .pen-wire.dashed { stroke-dasharray:5,3; }
  .pen-wire.dotted { stroke-dasharray:2,3; }
  .pen-wire.thick { stroke-width:2; }
  .pen-wire.dbl { stroke-width:1.5; }
  .pen-grid { stroke:#111; stroke-width:.5; }
  .ifix-bar { stroke:var(--ink); stroke-width:1; stroke-dasharray:6,4; }
  .pair-bracket { stroke:#444; stroke-width:.6; stroke-dasharray:3,3; fill:none; }
  .hatch-fill { fill:url(#hatch-T); }
  /* Drag handle: visible grab box on each node */
  .drag-box { fill:transparent; stroke:transparent; cursor:grab; }
  .drag-box:active { cursor:grabbing; }
  .drag-box:hover { stroke:var(--dim); stroke-width:.5; stroke-dasharray:2,3; }
  /* Delete button on each node */
  .del-btn { fill:#441; stroke:#888; stroke-width:.6; cursor:pointer; }
  .del-btn:hover { fill:#663; stroke:#f66; }
  .del-btn text { fill:#f66; font:8px monospace; pointer-events:none; }
  /* Undo bar */
  #undo-bar { position:absolute; top:4px; right:4px; z-index:5; display:flex; gap:2px; }
  #undo-bar button { font-size:10px; padding:1px 6px; background:#0a0a0a; }
  #undo-bar button:disabled { opacity:.3; cursor:default; }
  #undo-count { color:var(--dim); font-size:9px; padding:2px 4px 0; }
  /* Port labels */
  .port-lbl { fill:#555; font-size:8px; pointer-events:none; }
</style>
</head>
<body><div id="palette">
  <h1>⊙ IMASM Composer</h1>
  <div class="word-row">
    <input id="imas-word-input" placeholder="IMASM word… ⊢⊙◇+×●=¬⊣ or VINIT IMSCRIB…">
    <span id="imas-word-status">—</span>
  </div>
  <button id="word-btn" style="width:100%;margin-bottom:6px;font-size:10px;" onclick="composeWord()">compose word on canvas</button>
  <input id="filter" placeholder="filter tools…">
  <input type="file" id="mfile" accept=".json" style="font-size:9px" title="load imasm_manifest.json">
  <div class="sect">OPCODES</div><div id="ops"></div>
  <div class="sect">TOOLS</div><div id="tools"></div>
</div>
<div id="canvasWrap">
  <div id="undo-bar">
    <button id="undo-btn" disabled title="undo last action">↩ undo</button>
    <button id="redo-btn" disabled title="redo">↪ redo</button>
    <span id="undo-count"></span>
  </div>
  <svg id="canvas"></svg>
  <span id="hint">click palette to place · grab ▭ to drag · port→port to wire · dbl-click × to remove · type a word above</span>
</div>
<div id="speak">
  <h2>SPEAK</h2>
  <button onclick="copyCmds()">copy</button><button onclick="clearAll()">clear</button>
  <div id="cmds"></div>
  <div class="law">composition consumes living ends and never mints one · a program with no living ends is a finished loop, it does not compose</div>
</div>
<script type="application/json" id="manifest">{}</script>
<script>
// ── SVG ref ──
const svg = document.getElementById('canvas');

// ── Token definitions ──
const TOKEN_META = {
  VINIT:{glyph:"⊢",ins:0,outs:1,fam:0}, TANCH:{glyph:"⊣",ins:1,outs:1,fam:3},
  AFWD:{glyph:">",ins:1,outs:1,fam:3},  AREV:{glyph:"<",ins:1,outs:1,fam:3},
  CLINK:{glyph:"=",ins:1,outs:1,fam:3}, IMSCRIB:{glyph:"⊙",ins:1,outs:1,fam:3},
  FSPLIT:{glyph:"◇",ins:1,outs:2,fam:1}, FFUSE:{glyph:"●",ins:2,outs:1,fam:2},
  EVALT:{glyph:"+",ins:1,outs:1,fam:3}, EVALF:{glyph:"×",ins:1,outs:1,fam:3},
  ENGAGR:{glyph:"⊞",ins:1,outs:1,fam:3}, IFIX:{glyph:"¬",ins:1,outs:1,fam:3},
  FSPLIT3:{glyph:"∈",ins:0,outs:3,fam:1}, FFUSE3:{glyph:"∋",ins:3,outs:1,fam:2},
  EVALI:{glyph:"⊞",ins:1,outs:1,fam:3}, TNEG:{glyph:"~",ins:1,outs:1,fam:3},
  INEG:{glyph:"≁",ins:1,outs:1,fam:3}
};
// FIX: FAM_SHAPE uses 'rect' not 'square' so element creation matches
const FAM_SHAPE = ["circle","diamond","hexagon","rect"];
const PEN_EDGE = {
  VINIT:[null,1.5,"open",null], TANCH:["5,2,1,2,1,2",1.5,"open",null],
  AFWD:[null,2.5,"filled",null], AREV:["6,4",1.5,"filled",null],
  CLINK:["double",1,"filled",null], IMSCRIB:[null,1.5,"reverse","←"],
  FSPLIT:[null,1.5,"filled","◇"], FFUSE:[null,1.5,"filled","●"],
  EVALT:[null,1.5,"filled","+"], EVALF:[null,1.5,"filled","×"],
  ENGAGR:["zigzag",1.5,"filled",null], IFIX:["2,2",1.5,"filled",null],
  FSPLIT3:[null,2,"filled","∈"], FFUSE3:[null,2,"filled","∋"],
  EVALI:["4,2,1,2",1.5,"filled","⊞"], TNEG:["1,3",1.5,"open","~"],
  INEG:["2,1,1,1,1,1",1.5,"open","≁"]
};
const GLYPH_TO_TOKEN = Object.fromEntries(
  Object.entries(TOKEN_META).map(([n,m])=>[m.glyph,n])
);
const GLYPH_SET = new Set(Object.keys(GLYPH_TO_TOKEN));
const TOKEN_NAMES = new Set(Object.keys(TOKEN_META));

// ── State ──
let nodes = [];
let wires = [];
let armed = null;        // {node,side,slot} of selected out-port
let wordMode = false;
let nid = 0;
let MAN = {opcodes:[],tools:[]};

// ── Undo stack ──
let undoStack = [];
let redoStack = [];
const MAX_UNDO = 50;
function saveState(){
  undoStack.push(JSON.stringify({nodes,wires,armed,wordMode,nid}));
  if(undoStack.length>MAX_UNDO) undoStack.shift();
  redoStack = [];
  updateUndoUI();
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify({nodes,wires,armed,wordMode,nid}));
  const s = JSON.parse(undoStack.pop());
  nodes=s.nodes; wires=s.wires; armed=s.armed; wordMode=s.wordMode; nid=s.nid;
  draw(); speak(); updateUndoUI();
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify({nodes,wires,armed,wordMode,nid}));
  const s = JSON.parse(redoStack.pop());
  nodes=s.nodes; wires=s.wires; armed=s.armed; wordMode=s.wordMode; nid=s.nid;
  draw(); speak(); updateUndoUI();
}
function updateUndoUI(){
  document.getElementById('undo-btn').disabled = !undoStack.length;
  document.getElementById('redo-btn').disabled = !redoStack.length;
  document.getElementById('undo-count').textContent =
    undoStack.length ? `${undoStack.length} undo` : '';
}
document.getElementById('undo-btn').onclick = undo;
document.getElementById('redo-btn').onclick = redo;
// ── Manifest loader ──
(async function loadManifest(){
  try {
    const r = await fetch('ob3ects/imasm_manifest.json');
    MAN = await r.json();
    renderPalette();
  } catch(e){
    document.getElementById('hint').textContent =
      'no manifest — use file picker or serve locally';
  }
})();
document.getElementById('mfile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  f.text().then(t=>{ MAN=JSON.parse(t); renderPalette(); saveState(); });
});
document.getElementById('filter').addEventListener('input', renderPalette);

function renderPalette(){
  const q = document.getElementById('filter').value.toLowerCase();
  const ops = document.getElementById('ops'); ops.innerHTML = '';
  for(const o of MAN.opcodes){
    const d = document.createElement('div'); d.className = 'pitem';
    d.textContent = `${o.code} ${o.name}  ${o.arity_in}→${o.arity_out}`;
    d.onclick = ()=>{ addNode({kind:'op',name:o.name,code:o.code,ins:o.arity_in,outs:o.arity_out}); };
    ops.appendChild(d);
  }
  const tl = document.getElementById('tools'); tl.innerHTML = '';
  for(const t of MAN.tools){
    if(q && !t.name.toLowerCase().includes(q)) continue;
    const d = document.createElement('div'); d.className = 'pitem';
    d.innerHTML = `${t.name} <span class="meta">${t.free_in}▸in ${t.free_out}▸out · ${t.closure}</span>`;
    d.title = t.spec;
    d.onclick = ()=>{ addNode({kind:'tool',name:t.name,code:t.codes.join(''),ins:t.free_in,outs:t.free_out}); };
    tl.appendChild(d);
  }
}

function addNode(spec){
  saveState();
  const n = {id:nid++, x:60+(nodes.length%6)*155, y:80+Math.floor(nodes.length/6)*120, ...spec};
  nodes.push(n); draw(); speak();
}

function portsOf(n, side){
  const c = side==='in' ? n.ins : n.outs, out = [];
  for(let k=0; k<c; k++) out.push({node:n.id, side, slot:k});
  return out;
}
function portUsed(p){
  return wires.some(w => (p.side==='out' ? w.from.node===p.node&&w.from.slot===p.slot
                                         : w.to.node===p.node&&w.to.slot===p.slot));
}
function portXY(n, side, slot, count){
  const h = Math.max(48, 18*Math.max(n.ins,n.outs)+20);
  const y = n.y + 16 + (slot+1)*h/(count+1);
  return {x: side==='in' ? n.x : n.x+140, y};
}

// ── SVG element factory ──
function makeShape(shape, cx, cy, r, attrs){
  const ns = svg.namespaceURI;
  let el;
  if(shape === 'circle'){
    el = document.createElementNS(ns, 'circle');
    el.setAttribute('cx', cx); el.setAttribute('cy', cy); el.setAttribute('r', r);
  } else if(shape === 'rect'){
    el = document.createElementNS(ns, 'rect');
    el.setAttribute('x', cx-r); el.setAttribute('y', cy-r);
    el.setAttribute('width', 2*r); el.setAttribute('height', 2*r);
  } else {
    el = document.createElementNS(ns, 'polygon');
    const nPts = shape === 'diamond' ? 4 : 6;
    let pts = '';
    for(let k=0; k<nPts; k++){
      const a = Math.PI/2 + 2*Math.PI*k/nPts;
      pts += `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}${k<nPts-1?' ':''}`;
    }
    el.setAttribute('points', pts);
  }
  if(attrs) for(const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ── Hatch pattern defs ──
function ensureDefs(){
  const ns = svg.namespaceURI;
  if(svg.querySelector('defs')) return;
  const defs = document.createElementNS(ns, 'defs');
  defs.innerHTML = `<pattern id="hatch-T" width="4" height="4" patternUnits="userSpaceOnUse">
    <path d="M2,0L2,4" stroke="#fff" stroke-width="0.8"/></pattern>
    <pattern id="hatch-F" width="4" height="4" patternUnits="userSpaceOnUse">
    <path d="M0,2L4,2" stroke="#fff" stroke-width="0.8"/></pattern>
    <pattern id="hatch-B" width="4" height="4" patternUnits="userSpaceOnUse">
    <path d="M2,0L2,4M0,2L4,2" stroke="#fff" stroke-width="0.8"/></pattern>`;
  svg.prepend(defs);
}
// ── Main SVG renderer ──
function draw(){
  svg.innerHTML = '';
  ensureDefs();
  const ns = svg.namespaceURI;
  const W = svg.clientWidth || 1200, H = svg.clientHeight || 600;

  // Grid
  for(let gx=0; gx<W; gx+=40){
    const l = document.createElementNS(ns, 'line');
    l.setAttribute('x1',gx); l.setAttribute('y1',0);
    l.setAttribute('x2',gx); l.setAttribute('y2',H);
    l.setAttribute('class', 'pen-grid'); svg.appendChild(l);
  }
  for(let gy=0; gy<H; gy+=40){
    const l = document.createElementNS(ns, 'line');
    l.setAttribute('x1',0); l.setAttribute('y1',gy);
    l.setAttribute('x2',W); l.setAttribute('y2',gy);
    l.setAttribute('class', 'pen-grid'); svg.appendChild(l);
  }

  // Wires first (behind nodes)
  for(const w of wires){
    const a = nodes.find(n => n.id === w.from.node);
    const b = nodes.find(n => n.id === w.to.node);
    if(!a || !b) continue;
    const p1 = portXY(a, 'out', w.from.slot, a.outs);
    const p2 = portXY(b, 'in', w.to.slot, b.ins);
    const dx = Math.max(40, (p2.x-p1.x)/2);
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', `M${p1.x},${p1.y}C${p1.x+dx},${p1.y}${p2.x-dx},${p2.y}${p2.x},${p2.y}`);
    const srcName = a.kind === 'op' ? a.name : null;
    const style = srcName ? PEN_EDGE[srcName] : null;
    let cls = 'pen-wire';
    if(style){
      if(style[0] === 'double') cls += ' dbl';
      else if(style[0]) cls += ' dashed';
      if(style[1] >= 2) cls += ' thick';
      if(style[0]) path.setAttribute('stroke-dasharray', style[0]==='double'?'':style[0]);
    }
    path.setAttribute('class', cls);
    // Double-click on wire to remove it
    path.addEventListener('dblclick', e => {
      e.stopPropagation();
      saveState();
      wires = wires.filter(x => x !== w);
      draw(); speak();
    });
    svg.appendChild(path);
    // Midpoint glyph
    if(style && style[3]){
      const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
      const tg = document.createElementNS(ns, 'text');
      tg.setAttribute('x', mx); tg.setAttribute('y', my+3);
      tg.setAttribute('text-anchor', 'middle');
      tg.setAttribute('fill', '#888'); tg.setAttribute('font-size', '9px');
      tg.textContent = style[3];
      svg.appendChild(tg);
    }
  }

  // Nodes
  for(const n of nodes){
    const g = document.createElementNS(ns, 'g');
    const sel = armed && armed.node === n.id;
    const h = Math.max(48, 18*Math.max(n.ins,n.outs)+20);
    const cx = n.x+70, cy = n.y+h/2;
    const r = Math.min(28, Math.max(18, h/2-4));
    const meta = n.kind==='op' ? TOKEN_META[n.name] : null;
    const fam = meta ? meta.fam : 3;
    const shape = FAM_SHAPE[fam];
    const strokeColor = sel ? '#e3b341' : '#ddd';
    const strokeW = sel ? '1.8' : '1.2';

    // Draw shape (fill=none, pen-drawing style)
    const shEl = makeShape(shape, cx, cy, r, {
      'fill': 'none', 'stroke': strokeColor, 'stroke-width': strokeW
    });
    g.appendChild(shEl);

    // Hatch fill overlay for tool nodes
    if(n.kind === 'tool'){
      const hatch = makeShape(shape, cx, cy, r-3, {
        'fill': 'url(#hatch-T)', 'stroke': 'none', 'opacity': '0.15'
      });
      g.appendChild(hatch);
    }

    // Label above shape
    const t1 = document.createElementNS(ns, 'text');
    t1.setAttribute('x', cx); t1.setAttribute('y', cy-r-10);
    t1.setAttribute('text-anchor', 'middle');
    t1.setAttribute('fill', '#ddd'); t1.setAttribute('font-size', '10px');
    t1.textContent = n.name.length > 16 ? n.name.slice(0,15)+'…' : n.name;
    g.appendChild(t1);
    // Glyph inside shape
    const t2 = document.createElementNS(ns, 'text');
    t2.setAttribute('x', cx); t2.setAttribute('y', cy+4);
    t2.setAttribute('text-anchor', 'middle');
    t2.setAttribute('fill', '#fff'); t2.setAttribute('font-size', '14px');
    t2.setAttribute('font-weight','bold');
    t2.textContent = n.code.length > 3 ? n.code.slice(0,3) : n.code;
    g.appendChild(t2);

    // Ports
    for(const side of ['in','out']){
      const count = side==='in' ? n.ins : n.outs;
      for(let k=0; k<count; k++){
        const p = portXY(n, side, k, count);
        const used = portUsed({node:n.id, side, slot:k});
        const isArmed = armed && armed.node===n.id && armed.side===side && armed.slot===k;
        const c = document.createElementNS(ns, 'circle');
        c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', 5);
        c.setAttribute('class', 'pen-port '+(used?'used':'free')+(isArmed?' armed':''));
        c.addEventListener('click', ev => { ev.stopPropagation(); clickPort({node:n.id,side,slot:k}, used); });
        g.appendChild(c);
        if(count > 1){
          const pl = document.createElementNS(ns, 'text');
          pl.setAttribute('x', side==='in' ? p.x-8 : p.x+8);
          pl.setAttribute('y', p.y+3);
          pl.setAttribute('text-anchor', side==='in' ? 'end' : 'start');
          pl.setAttribute('class', 'port-lbl');
          pl.textContent = k;
          g.appendChild(pl);
        }
      }
    }

    // ── DRAG BOX: visible transparent rectangle — THE "BOX TO GRAB" ──
    const dragBox = document.createElementNS(ns, 'rect');
    dragBox.setAttribute('x', n.x-4); dragBox.setAttribute('y', n.y-4);
    dragBox.setAttribute('width', 148); dragBox.setAttribute('height', h+8);
    dragBox.setAttribute('rx', 3); dragBox.setAttribute('ry', 3);
    dragBox.setAttribute('class', 'drag-box');
    // Drag logic
    dragBox.addEventListener('mousedown', ev => {
      if(ev.button !== 0) return;
      ev.preventDefault();
      const rect = svg.getBoundingClientRect();
      const ox = ev.clientX - rect.left - n.x;
      const oy = ev.clientY - rect.top - n.y;
      const mv = e2 => {
        const r2 = svg.getBoundingClientRect();
        n.x = e2.clientX - r2.left - ox;
        n.y = e2.clientY - r2.top - oy;
        draw();
      };
      const up = () => {
        svg.removeEventListener('mousemove', mv);
        svg.removeEventListener('mouseup', up);
      };
      svg.addEventListener('mousemove', mv);
      svg.addEventListener('mouseup', up);
    });
    g.appendChild(dragBox);    // ── DELETE BUTTON (×) — visible, always works ──
    const delBtn = document.createElementNS(ns, 'circle');
    delBtn.setAttribute('cx', n.x+140); delBtn.setAttribute('cy', n.y);
    delBtn.setAttribute('r', 7);
    delBtn.setAttribute('class', 'del-btn');
    delBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      saveState();
      nodes = nodes.filter(x => x !== n);
      wires = wires.filter(w => w.from.node !== n.id && w.to.node !== n.id);
      if(armed && armed.node === n.id) armed = null;
      draw(); speak();
    });
    g.appendChild(delBtn);
    const delX = document.createElementNS(ns, 'text');
    delX.setAttribute('x', n.x+140); delX.setAttribute('y', n.y+3);
    delX.setAttribute('text-anchor', 'middle');
    
    delX.setAttribute('style', 'fill:#f66;font:9px monospace;pointer-events:none;');
    delX.textContent = '×';
    g.appendChild(delX);

    // Keep dblclick on shape as secondary delete (only works if not moved)
    shEl.addEventListener('dblclick', ev => {
      ev.stopPropagation();
      saveState();
      nodes = nodes.filter(x => x !== n);
      wires = wires.filter(w => w.from.node !== n.id && w.to.node !== n.id);
      if(armed && armed.node === n.id) armed = null;
      draw(); speak();
    });

    svg.appendChild(g);

    // IFIX barrier markers
    if(n.kind === 'op' && n.name === 'IFIX'){
      for(const off of [-2.5, 2.5]){
        const bar = document.createElementNS(ns, 'line');
        bar.setAttribute('x1', cx+off); bar.setAttribute('y1', n.y-6);
        bar.setAttribute('x2', cx+off); bar.setAttribute('y2', n.y+h+6);
        bar.setAttribute('class', 'ifix-bar');
        svg.appendChild(bar);
      }
      const xm = document.createElementNS(ns, 'text');
      xm.setAttribute('x', cx-16); xm.setAttribute('y', n.y-10);
      xm.setAttribute('fill', '#888'); xm.setAttribute('font-size', '8px');
      xm.textContent = 'IFIX';
      svg.appendChild(xm);
    }
  }
}

// ── Port click / wire binding ──
function clickPort(p, used){
  if(used) return;
  if(p.side === 'out'){
    saveState();
    armed = p;
    draw();
    return;
  }
  // p.side === 'in'
  if(armed && armed.side === 'out' && armed.node !== p.node){
    saveState();
    wires.push({from:armed, to:p});
    armed = null;
    draw(); speak();
  } else {
    armed = null;
    draw();
  }
}

// ── SPEAK command generator ──
function speak(){
  const lines = [];
  const toolNodes = nodes.filter(n => n.kind === 'tool');
  const opNodes = nodes.filter(n => n.kind === 'op');
  const bound = wires.filter(w => {
    const a = nodes.find(n => n.id === w.from.node);
    const b = nodes.find(n => n.id === w.to.node);
    return a && b && a.kind === 'tool' && b.kind === 'tool';
  });
  let step = 0;
  for(const w of bound){
    const a = nodes.find(n => n.id === w.from.node);
    const b = nodes.find(n => n.id === w.to.node);
    const name = step===0 ? `${a.name}__x__${b.name}`.slice(0,48) : `composite_${step+1}`;
    lines.push(`imasm compose ${name} ${step===0?a.name:'composite_'+step} ${step===0?b.name:b.name}`);
    step++;
  }
  if(toolNodes.length >= 2 && toolNodes.length <= 6)
    lines.push(`imasm chaos ${toolNodes.map(n=>n.name).join(' ')}`);
  if(opNodes.length > 0 && opNodes.length === nodes.length){
    const idx = new Map(opNodes.map((n,i)=> [n.id,i]));
    const es = wires.map(w => `${idx.get(w.from.node)}-${idx.get(w.to.node)}`);
    lines.push(`imasm define composed_${Date.now()%10000} wire ${opNodes.map(n=>n.name).join(' ')} / ${es.join(' ')}`);
  }
  for(const n of nodes) if(n.kind === 'tool')
    lines.push(`imasm eval ${n.name}    # flow it   ·   imasm prove ${n.name}    # kernel`);
  document.getElementById('cmds').textContent =
    lines.length ? lines.join('\n') : '(place programs, bind ports — commands appear here)';
}
// ── Live IMASM word input ──
(function initWordInput(){
  const input = document.getElementById('imas-word-input');
  const statusEl = document.getElementById('imas-word-status');
  if(!input) return;

  function parseImasmWord(text){
    const t = text.trim();
    if(!t) return null;
    const chars = [...t];
    const allGlyphs = chars.every(c => GLYPH_SET.has(c) || c === ' ');
    let tokenNames;
    if(allGlyphs && chars.length > 1){
      tokenNames = chars.filter(c => GLYPH_SET.has(c)).map(c => GLYPH_TO_TOKEN[c]);
    } else {
      tokenNames = t.split(/\s+/).map(p => p.toUpperCase()).filter(p => TOKEN_NAMES.has(p));
    }
    return tokenNames.length ? tokenNames : null;
  }

  let timer = null;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      const text = input.value;
      if(!text.trim()){ statusEl.textContent = '—'; return; }
      const tokens = parseImasmWord(text);
      if(!tokens || tokens.length === 0){
        statusEl.textContent = 'unrecognized';
        statusEl.style.color = '#ff6666';
        return;
      }
      const glyphPreview = tokens.map(n => TOKEN_META[n].glyph).join(' ');
      statusEl.textContent = `${tokens.length} tok: ${glyphPreview}`;
      statusEl.style.color = '#888';
    }, 150);
  });
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter'){ clearTimeout(timer); composeWord(); }
  });
})();

// ── Compose word on canvas ──
window.composeWord = function(){
  const input = document.getElementById('imas-word-input');
  const statusEl = document.getElementById('imas-word-status');
  const text = input.value.trim();
  if(!text) return;
  const chars = [...text];
  const allGlyphs = chars.every(c => GLYPH_SET.has(c) || c === ' ');
  let tokenNames;
  if(allGlyphs && chars.length > 1){
    tokenNames = chars.filter(c => GLYPH_SET.has(c)).map(c => GLYPH_TO_TOKEN[c]);
  } else {
    tokenNames = text.split(/\s+/).map(p => p.toUpperCase()).filter(p => TOKEN_NAMES.has(p));
  }
  if(!tokenNames || tokenNames.length === 0){
    statusEl.textContent = 'unrecognized';
    statusEl.style.color = '#ff6666';
    return;
  }
  saveState();
  nodes = []; wires = []; armed = null;
  const placed = [];
  for(let i=0; i<tokenNames.length; i++){
    const name = tokenNames[i];
    const meta = TOKEN_META[name];
    if(!meta) continue;
    const n = {id:nid++, x:40+i*130, y:180, kind:'op', name, code:meta.glyph, ins:meta.ins, outs:meta.outs};
    nodes.push(n);
    placed.push(n);
  }
  // Auto-wire: first free out → first free in of next
  for(let i=0; i<placed.length-1; i++){
    const from = placed[i], to = placed[i+1];
    for(let so=0; so<from.outs; so++){
      if(wires.some(w => w.from.node===from.id && w.from.slot===so)) continue;
      for(let si=0; si<to.ins; si++){
        if(wires.some(w => w.to.node===to.id && w.to.slot===si)) continue;
        wires.push({from:{node:from.id,side:'out',slot:so}, to:{node:to.id,side:'in',slot:si}});
        break;
      }
      break;
    }
  }
  wordMode = true;
  draw(); speak();
  statusEl.textContent = `composed: ${tokenNames.map(n=>TOKEN_META[n].glyph).join(' ')}`;
  statusEl.style.color = '#8c8';
};

function copyCmds(){
  navigator.clipboard.writeText(document.getElementById('cmds').textContent);
}
function clearAll(){
  saveState();
  nodes = []; wires = []; armed = null; wordMode = false;
  draw(); speak();
}

// ── Init ──
draw(); speak();
